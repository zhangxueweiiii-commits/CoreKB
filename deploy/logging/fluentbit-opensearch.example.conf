[SERVICE]
    Flush        5
    Log_Level    info
    Parsers_File parsers.conf

[INPUT]
    Name              tail
    Path              /var/lib/docker/containers/*/*.log
    Parser            docker
    Tag               corekb.*
    Refresh_Interval  10
    Mem_Buf_Limit      20MB

[FILTER]
    Name    parser
    Match   corekb.*
    Key_Name log
    Parser  json
    Reserve_Data On

[OUTPUT]
    Name            opensearch
    Match           corekb.*
    Host            opensearch
    Port            9200
    Index           corekb
    Suppress_Type_Name On
