server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: corekb-docker-json
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(corekb-)?(backend|worker|beat|nginx|frontend|postgres|redis|qdrant)(-[0-9]+)?"
        action: keep
      - source_labels: ["__meta_docker_container_name"]
        target_label: container
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: service
    pipeline_stages:
      - json:
          expressions:
            log: log
            stream: stream
            time: time
      - json:
          source: log
          expressions:
            timestamp: timestamp
            level: level
            request_id: request_id
            trace_id: trace_id
            user_id: user_id
            module: module
            message: message
            error: error
      - labels:
          level:
          module:
          trace_id:
          request_id:
      - output:
          source: message
