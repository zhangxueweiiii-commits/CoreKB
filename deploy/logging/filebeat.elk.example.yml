filebeat.inputs:
  - type: container
    paths:
      - /var/lib/docker/containers/*/*.log
    processors:
      - add_docker_metadata:
          host: "unix:///var/run/docker.sock"
      - decode_json_fields:
          fields: ["message"]
          target: "corekb"
          overwrite_keys: true
      - drop_event:
          when:
            not:
              regexp:
                container.name: "corekb-(backend|worker|beat|flower|frontend|postgres|redis|qdrant)-.*"

output.elasticsearch:
  hosts: ["http://elasticsearch:9200"]
  index: "corekb-%{+yyyy.MM.dd}"

setup.template.name: "corekb"
setup.template.pattern: "corekb-*"
