server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: corekb-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/corekb-(backend|worker|beat|flower|frontend|postgres|redis|qdrant)-.*"
        action: keep
      - source_labels: ["__meta_docker_container_name"]
        target_label: container
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            level: level
            request_id: request_id
            user_id: user_id
            module: module
            message: message
            error: error
      - labels:
          level:
          module:
