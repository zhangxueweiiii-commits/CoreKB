name: Agent CI

on:
  pull_request:

jobs:
  agent-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate agent workflow
        run: python agent/runner.py check

      - name: Validate agent result files
        run: python scripts/check_agent_result.py "agent/results/*_result.md"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run canonical backend tests
        working-directory: backend
        run: python -m pytest -q
