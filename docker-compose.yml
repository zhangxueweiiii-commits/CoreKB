services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-corekb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-corekb}
      POSTGRES_DB: ${POSTGRES_DB:-corekb}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-corekb} -d ${POSTGRES_DB:-corekb}"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.11.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - backend_storage:/app/storage

  worker:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      OTEL_SERVICE_NAME: ${OTEL_WORKER_SERVICE_NAME:-corekb-worker}
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=INFO
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_started
    volumes:
      - backend_storage:/app/storage

  beat:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      OTEL_SERVICE_NAME: ${OTEL_WORKER_SERVICE_NAME:-corekb-worker}
    command: celery -A app.tasks.celery_app.celery_app beat --loglevel=INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - backend_storage:/app/storage
      - qdrant_data:/qdrant/storage:ro

  flower:
    build:
      context: ./backend
    env_file:
      - .env
    command: celery -A app.tasks.celery_app.celery_app flower --address=0.0.0.0 --port=5555 --basic_auth=${FLOWER_BASIC_AUTH:-admin:ChangeMe123!}
    depends_on:
      redis:
        condition: service_started
      worker:
        condition: service_started
    ports:
      - "127.0.0.1:5555:5555"

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api}
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
  qdrant_data:
  redis_data:
  backend_storage:
